version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: devdocs-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devdocs

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: devdocs-qdrant

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage


volumes:

  postgres_data:

  qdrant_data: